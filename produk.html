<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Mengatur karakter agar mendukung huruf dan simbol UTF-8 -->
    <meta charset="UTF-8">

    <!-- Membuat tampilan responsif di berbagai ukuran layar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Judul halaman yang tampil di tab browser -->
    <title>Kayee Geutanyoe - Produk</title>

    <!-- Memanggil framework Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Memanggil library Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Menghubungkan file CSS eksternal -->
    <link rel="stylesheet" href="style.css">
</head>

<!-- Body menggunakan background terang dan flexbox agar footer selalu di bawah -->
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Header / Navbar -->
    <header class="navbar navbar-expand-lg navbar-light bg-white sticky-top border-bottom">
        <div class="container">

            <!-- Logo atau nama website -->
            <div class="logo navbar-brand fw-bold text-success">Kayee Geutanyoe</div>

            <!-- Tombol menu untuk tampilan mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu navigasi -->
            <nav class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <!-- Menu Beranda -->
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Beranda</a>
                    </li>

                    <!-- Menu Produk (halaman aktif) -->
                    <li class="nav-item">
                        <a class="nav-link active fw-bold text-success" href="produk.html">Produk</a>
                    </li>

                    <!-- Menu Kategori -->
                    <li class="nav-item">
                        <a class="nav-link" href="kategori.html">Kategori</a>
                    </li>

                    <!-- Menu Kontak -->
                    <li class="nav-item">
                        <a class="nav-link" href="kontak.html">Kontak</a>
                    </li>

                </ul>
            </nav>
        </div>
    </header>

    <!-- Section Daftar Produk -->
    <section class="py-5">
        <div class="container">

            <!-- Judul bagian produk -->
            <h2 class="text-center fw-bold mb-5">Daftar Produk Terlaris</h2>

            <!-- Grid produk menggunakan Bootstrap -->
            <div class="row row-cols-1 row-cols-md-3 g-4 product-grid">
                
                <!-- Produk 1 -->
                <div class="col">
                    <article class="card h-100 product-card border-0 shadow-sm overflow-hidden">

                        <!-- Gambar produk -->
                        <div class="product-img" style="height: 220px;">
                            <img src="foto/sofaa.jpg" alt="Sofa Sudut L-Shaped" class="w-100 h-100 object-fit-cover">
                        </div>

                        <!-- Informasi produk -->
                        <div class="card-body text-center">
                            <h3 class="h5 card-title fw-bold">Sofa Sudut L-Shaped</h3>

                            <!-- Harga produk -->
                            <p class="price text-success fw-bold fs-5">Rp 1.295.000</p>

                            <!-- Tombol beli -->
                            <button class="btn btn-outline-success btn-sm w-100 btn-beli">
                                Beli Sekarang
                            </button>
                        </div>
                    </article>
                </div>
                
                <!-- Produk 2 -->
                <div class="col">
                    <article class="card h-100 product-card border-0 shadow-sm overflow-hidden">

                        <!-- Gambar produk -->
                        <div class="product-img" style="height: 220px;">
                            <img src="foto/kursi 2.jpg" alt="Kursi Kantor Ergonomis" class="w-100 h-100 object-fit-cover">
                        </div>

                        <!-- Informasi produk -->
                        <div class="card-body text-center">
                            <h3 class="h5 card-title fw-bold">Kursi Kantor Ergonomis</h3>

                            <!-- Harga produk -->
                            <p class="price text-success fw-bold fs-5">Rp 1.150.000</p>

                            <!-- Tombol beli -->
                            <button class="btn btn-outline-success btn-sm w-100 btn-beli">
                                Beli Sekarang
                            </button>
                        </div>
                    </article>
                </div>
                
                <!-- Produk 3 -->
                <div class="col">
                    <article class="card h-100 product-card border-0 shadow-sm overflow-hidden">

                        <!-- Gambar produk -->
                        <div class="product-img" style="height: 220px;">
                            <img src="foto/lemari 4.jpeg" alt="Lemari Kayu Minimalis" class="w-100 h-100 object-fit-cover">
                        </div>

                        <!-- Informasi produk -->
                        <div class="card-body text-center">
                            <h3 class="h5 card-title fw-bold">Lemari Kayu Minimalis</h3>

                            <!-- Harga produk -->
                            <p class="price text-success fw-bold fs-5">Rp 2.450.000</p>

                            <!-- Tombol beli -->
                            <button class="btn btn-outline-success btn-sm w-100 btn-beli">
                                Beli Sekarang
                            </button>
                        </div>
                    </article>
                </div>

            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-3 text-center mt-auto">
        <div class="container">

            <!-- Copyright -->
            <p class="mb-0">
                &copy; 2026 Kayee Geutanyoe. Semua hak dilindungi.
            </p>

        </div>
    </footer>

    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- File JavaScript buatan sendiri -->
    <script src="script.js"></script>

</body>
</html>
