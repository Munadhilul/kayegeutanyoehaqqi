<!-- Menandakan bahwa dokumen ini menggunakan standar struktur HTML5 terbaru -->
<!DOCTYPE html>
<!-- Mengatur bahasa utama dokumen menggunakan Bahasa Indonesia (id) -->
<html lang="id">
<head>
    <!-- Mengatur pengkodean karakter universal agar semua simbol teks terbaca dengan benar -->
    <meta charset="UTF-8">
    <!-- Mengatur area pandang agar halaman tampil responsif di berbagai ukuran layar monitor dan HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Judul halaman yang akan muncul pada tab browser saat dibuka -->
    <title>Kayee Geutanyoe - Kategori</title>
    <!-- Menghubungkan library Bootstrap 5 CSS via CDN untuk menyusun tata letak secara instan -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Menghubungkan library Font Awesome untuk menampilkan ikon-ikon dekorasi gratis -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Menghubungkan file stylesheet eksternal buatan kita sendiri (style.css) -->
    <link rel="stylesheet" href="style.css">
</head>
<!-- Mengaktifkan Flexbox vertikal dan batas tinggi minimal 100vh agar footer terdorong ke paling bawah layar -->
<body class="d-flex flex-column min-vh-100">

    <!-- Komponen Navigasi Atas: berlatar belakang putih, menempel saat di-scroll, dan bergaris bawah -->
    <header class="navbar navbar-expand-lg navbar-light bg-white sticky-top border-bottom">
        <!-- Kontainer pembungkus isi navigasi agar presisi berada di tengah halaman -->
        <div class="container">
            <!-- Elemen logo teks brand toko dengan cetak tebal dan berwarna hijau kesuksesan -->
            <div class="logo navbar-brand fw-bold text-success">Kayee Geutanyoe</div>
            <!-- Tombol menu hamburger yang muncul otomatis ketika website diakses via layar HP -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <!-- Gambar ikon garis tiga sebagai visual dari tombol menu responsive -->
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Area pembungkus daftar menu yang bisa menyusut/sembunyi di dalam layar gadget kecil -->
            <nav class="collapse navbar-collapse" id="navbarNav">
                <!-- Daftar tautan menu navigasi berjejer yang posisinya digeser otomatis ke sisi kanan (ms-auto) -->
                <ul class="navbar-nav ms-auto">
                    <!-- Menu Beranda: mengarah ke halaman utama index.html -->
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <!-- Menu Produk: mengarah ke halaman daftar produk.html -->
                    <li class="nav-item"><a class="nav-link" href="produk.html">Produk</a></li>
                    <!-- Menu Kategori: diatur aktif, dicetak tebal, dan berwarna hijau penanda halaman yang sedang dibuka -->
                    <li class="nav-item"><a class="nav-link active fw-bold text-success" href="kategori.html">Kategori</a></li>
                    <!-- Menu Kontak: mengarah ke halaman informasi kontak.html -->
                    <li class="nav-item"><a class="nav-link" href="kontak.html">Kontak</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Bagian Utama Konten Grid Kategori: diberi jarak vertikal atas-bawah sebesar py-5 -->
    <section class="py-5">
        <!-- Kontainer pembungkus agar isi kotak kategori tertata rapi di tengah dengan teks rata tengah -->
        <div class="container text-center">
            <!-- Judul bagian utama berukuran tebal dengan jarak margin bawah sebesar mb-5 -->
            <h2 class="fw-bold mb-5">Eksplor Kategori Produk</h2>
            <!-- Baris pembungkus kotak kategori: 1 kolom di HP, 2 kolom di tablet, dan 3 kolom di komputer desktop -->
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4 category-grid">
                <!-- Kolom Kotak Kategori 1 -->
                <div class="col">
                    <!-- Kotak item kategori: diberi padding, garis pembatas, sudut tumpul, bayangan tipis, dan berlatar terang -->
                    <div class="category-item p-4 border rounded shadow-sm bg-light fs-5 fw-semibold text-dark">
                        <!-- Memanggil ikon sofa berwarna hijau dengan jarak spasi kanan (me-2) -->
                        <i class="fa-solid fa-couch text-success me-2"></i>Sofa
                    </div>
                </div>
                <!-- Kolom Kotak Kategori 2 -->
                <div class="col">
                    <!-- Kotak item kategori untuk Kursi -->
                    <div class="category-item p-4 border rounded shadow-sm bg-light fs-5 fw-semibold text-dark">
                        <!-- Memanggil ikon kursi kantor berwarna hijau -->
                        <i class="fa-solid fa-chair text-success me-2"></i>Kursi
                    </div>
                </div>
                <!-- Kolom Kotak Kategori 3 -->
                <div class="col">
                    <!-- Kotak item kategori untuk Lemari -->
                    <div class="category-item p-4 border rounded shadow-sm bg-light fs-5 fw-semibold text-dark">
                        <!-- Memanggil ikon kotak berkas/lemari berwarna hijau -->
                        <i class="fa-solid fa-box text-success me-2"></i>Lemari
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Bagian Kaki Halaman (Footer): berlatar gelap, teks putih, jarak vertikal tipis, dan margin atas otomatis (mt-auto) -->
    <footer class="bg-dark text-white py-3 text-center mt-auto">
        <!-- Kontainer penyeimbang posisi teks hak cipta -->
        <div class="container">
            <!-- Teks informasi hak cipta (Copyright) resmi bertahun 2026 -->
            <p class="mb-0">&copy; 2026 Kayee Geutanyoe. Semua hak dilindungi.</p>
        </div>
    </footer>

    <!-- Menyisipkan library JavaScript utama milik Bootstrap 5 agar fitur responsive berfungsi -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
